<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Prospera Finance</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header sama seperti index.html -->
    
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-image">
                    <img src="images/login-hero.png" alt="Login Prospera">
                </div>
                <div class="auth-form">
                    <div class="auth-header">
                        <h1>Selamat Datang Kembali</h1>
                        <p>Masuk untuk mengakses akun Anda</p>
                    </div>
                    <form id="loginForm" class="auth-form-group">
                        <div class="form-group">
                            <label>No. HP atau Email</label>
                            <div class="input-group">
                                <i class="fas fa-user"></i>
                                <input type="text" id="loginPhone" placeholder="0812xxxxxxx atau email@example.com" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="loginPassword" placeholder="••••••••" required>
                                <i class="fas fa-eye toggle-password" id="toggleLoginPassword"></i>
                            </div>
                        </div>
                        <div class="form-options">
                            <label class="checkbox">
                                <input type="checkbox" id="rememberMe">
                                <span class="checkmark"></span>
                                Ingat saya
                            </label>
                            <a href="#" class="forgot-password">Lupa Password?</a>
                        </div>
                        <button type="submit" class="btn-primary btn-full">Masuk</button>
                    </form>
                    <div class="auth-divider">
                        <span>atau</span>
                    </div>
                    <div class="social-login">
                        <button class="social-btn google">
                            <i class="fab fa-google"></i>
                            Google
                        </button>
                        <button class="social-btn whatsapp">
                            <i class="fab fa-whatsapp"></i>
                            WhatsApp
                        </button>
                    </div>
                    <div class="auth-footer">
                        <p>Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer sama seperti index.html -->
    
    <script src="js/auth.js"></script>
</body>
</html>
